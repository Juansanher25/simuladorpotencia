<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinámica de Sistemas de Bombeo - Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #020617; color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        input[type=range] { accent-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root" class="min-h-screen"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // Configuración Chart.js Dark Mode
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = '#1e293b';

        // --- ICONOS ---
        const PumpIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a10 10 0 0 1 10 10"></path><path d="M12 12 2.5 9.5"></path><path d="M12 12 2.5 14.5"></path><path d="M12 12 22 12"></path></svg>;
        const PipeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><path d="M2 12h20"></path><path d="M2 8h20"></path><path d="M2 16h20"></path></svg>;
        const DropletsIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 2.9 7 2.9s-2.15 5.25-3.29 6.16C2.57 10 2 11.09 2 12.25c0 2.22 1.8 4.05 5 4.05z"></path><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"></path></svg>;
        const BookIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        const PlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const TrashIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const ExpandIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>;
        const CloseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;

        // --- BASE DE DATOS DE ACCESORIOS ---
        const DB_ACCESORIOS = {
            'codo90': { name: 'Codo 90° estándar', k: 0.75 },
            'codo45': { name: 'Codo 45° estándar', k: 0.40 },
            'codoRadioLargo': { name: 'Codo 90° radio largo', k: 0.20 },
            'valvCompuertaAbierta': { name: 'Válvula Compuerta (Abierta)', k: 0.20 },
            'valvCompuertaMitad': { name: 'Válvula Compuerta (Mitad)', k: 5.60 },
            'valvGloboAbierta': { name: 'Válvula Globo (Abierta)', k: 10.0 },
            'valvCheck': { name: 'Válvula Retención (Check)', k: 2.00 },
            'entradaBordeRecto': { name: 'Entrada Tanque (Borde Recto)', k: 0.50 },
            'salidaTanque': { name: 'Salida a Tanque', k: 1.00 },
        };

        function PumpSimulation() {
            // --- ESTADOS: Fluido ---
            const [fluidPreset, setFluidPreset] = useState('agua20');
            const [rho, setRho] = useState(998.2);       // Densidad (kg/m3)
            const [nu, setNu] = useState(1.004e-6);      // Viscosidad cinemática (m2/s)

            // --- ESTADOS: Bomba ---
            const [h0, setH0] = useState(50);            // Altura corte (m)
            const [aCoef, setA] = useState(0.015);       // Coef. caída (m / (m3/h)²)

            // --- ESTADOS: Sistema y Geometría ---
            const [z, setZ] = useState(15);              // Elevación estática (m)
            const [dp, setDp] = useState(0.5);           // ΔP (bar)
            const [l, setL] = useState(100);             // Longitud tubería (m)
            const [d, setD] = useState(65);              // Diámetro interno (mm)
            
            // --- ESTADOS: Rugosidad Absoluta (e) ---
            const [matPreset, setMatPreset] = useState('pvc');
            const [roughnessE, setRoughnessE] = useState(0.0015); // e en mm

            // --- ESTADOS: Accesorios ---
            const [accesorios, setAccesorios] = useState([
                { id: 1, type: 'codo90', qty: 4 },
                { id: 2, type: 'valvCompuertaAbierta', qty: 2 }
            ]);
            const [newAccType, setNewAccType] = useState('codo90');
            const [newAccQty, setNewAccQty] = useState(1);

            // --- ESTADOS: Modal Expandido ---
            const [expandedChart, setExpandedChart] = useState(null);

            // Refs de Gráficos
            const chartOpRef = useRef(null);
            const chartDRef = useRef(null);
            const chartZRef = useRef(null);
            const expandedChartRef = useRef(null);

            // --- ACTUALIZACIONES DE PRESETS ---
            useEffect(() => {
                if (fluidPreset === 'agua20') { setRho(998.2); setNu(1.004e-6); }
                else if (fluidPreset === 'agua80') { setRho(971.8); setNu(0.365e-6); }
                else if (fluidPreset === 'aceiteLigero') { setRho(880); setNu(1.5e-5); }
            }, [fluidPreset]);

            useEffect(() => {
                if (matPreset === 'pvc') setRoughnessE(0.0015);
                else if (matPreset === 'aceroComercial') setRoughnessE(0.045);
                else if (matPreset === 'fundicion') setRoughnessE(0.26);
            }, [matPreset]);

            // Cálculo Sumatoria de K
            const sumK = useMemo(() => accesorios.reduce((acc, item) => acc + (DB_ACCESORIOS[item.type]?.k || 0) * item.qty, 0), [accesorios]);

            // Funciones manejo accesorios
            const addAccessory = () => {
                if (newAccQty > 0) {
                    setAccesorios([...accesorios, { id: Date.now(), type: newAccType, qty: parseInt(newAccQty) }]);
                }
            };
            const removeAccessory = (id) => setAccesorios(accesorios.filter(a => a.id !== id));

            // --- NÚCLEO MATEMÁTICO AVANZADO ---
            const calculateOperatingPoint = (H0_val, a_val, Z_val, dp_val, L_val, D_mm, sK_val, e_mm, rho_val, nu_val) => {
                const D_m = D_mm / 1000;
                const e_m = e_mm / 1000;
                const Area = (Math.PI / 4) * Math.pow(D_m, 2);
                
                // Altura estática considerando el peso específico real (rho * g)
                const H_stat = Z_val + (dp_val * 100000) / (rho_val * 9.81);

                // Ecuación del Sistema (H_sys - H_pump) para un Q dado en m3/h
                const evaluateDeltaH = (Q_h) => {
                    if (Q_h <= 0) return H_stat - H0_val;
                    
                    const Q_s = Q_h / 3600; // m3/s
                    const V = Q_s / Area;   // m/s
                    const Re = (V * D_m) / nu_val;
                    
                    let f = 0;
                    if (Re < 2300) {
                        f = 64 / Math.max(Re, 1);
                    } else {
                        // Ecuación de Swamee-Jain
                        f = 0.25 / Math.pow(Math.log10((e_m / (3.7 * D_m)) + (5.74 / Math.pow(Re, 0.9))), 2);
                    }

                    const H_fric = f * (L_val / D_m) * (Math.pow(V, 2) / (2 * 9.81));
                    const H_loc = sK_val * (Math.pow(V, 2) / (2 * 9.81));
                    const H_sys = H_stat + H_fric + H_loc;
                    const H_pump = H0_val - a_val * Math.pow(Q_h, 2);
                    
                    return H_sys - H_pump;
                };

                // Búsqueda binaria (Bisection Method) para hallar la raíz
                let Q_min = 0;
                let Q_max = Math.sqrt(H0_val / a_val); 
                let Q_op = 0;

                if (evaluateDeltaH(0) >= 0) {
                    return { Q_op: 0, H_op: H_stat, P_hid: 0, H_stat, Re: 0, f: 0 };
                }

                for (let i = 0; i < 40; i++) {
                    let Q_mid = (Q_min + Q_max) / 2;
                    if (evaluateDeltaH(Q_mid) > 0) {
                        Q_max = Q_mid; 
                    } else {
                        Q_min = Q_mid; 
                    }
                    Q_op = Q_mid;
                }

                const Q_s_op = Q_op / 3600;
                const V_op = Q_s_op / Area;
                const Re_op = (V_op * D_m) / nu_val;
                let f_op = 0;
                if (Q_op > 0) {
                    f_op = (Re_op < 2300) ? 64 / Re_op : 0.25 / Math.pow(Math.log10((e_m / (3.7 * D_m)) + (5.74 / Math.pow(Re_op, 0.9))), 2);
                }
                const H_op = H0_val - a_val * Math.pow(Q_op, 2);
                const P_hid = (rho_val * 9.81 * Q_s_op * H_op) / 1000; // kW

                return { Q_op, H_op, P_hid, H_stat, Re: Re_op, f: f_op };
            };

            const res = useMemo(() => calculateOperatingPoint(h0, aCoef, z, dp, l, d, sumK, roughnessE, rho, nu), 
                [h0, aCoef, z, dp, l, d, sumK, roughnessE, rho, nu]);

            // --- GRÁFICOS (Chart.js) ---
            const chartOptions = {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#94a3b8', font: {size: 11} } } },
                scales: { 
                    x: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } }, 
                    y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } } 
                }
            };

            useEffect(() => {
                chartOpRef.current = new Chart(document.getElementById('chart_op'), { type: 'line', data: { datasets: [] }, options: { ...chartOptions, plugins: { title: { display: true, text: 'Curvas Reales de Operación', color: '#e2e8f0' }, legend: {display: true} }, scales: { x: { title: { display: true, text: 'Caudal Q (m³/h)', color: '#94a3b8' }}, y: { title: { display: true, text: 'Altura H (m)', color: '#94a3b8' } } } } });
                chartDRef.current = new Chart(document.getElementById('chart_d'), { type: 'line', data: { datasets: [] }, options: { ...chartOptions, plugins: { title: { display: true, text: 'Sensibilidad vs. Diámetro', color: '#e2e8f0' }, legend: {display: false} }, scales: { x: { title: { display: true, text: 'Diámetro D (mm)', color: '#94a3b8' }}, y: { position: 'left', title: { display: true, text: 'Caudal (m³/h)', color: '#3b82f6' } }, y1: { position: 'right', grid: {drawOnChartArea: false}, title: { display: true, text: 'Altura (m)', color: '#f59e0b' } } } } });
                chartZRef.current = new Chart(document.getElementById('chart_z'), { type: 'line', data: { datasets: [] }, options: { ...chartOptions, plugins: { title: { display: true, text: 'Sensibilidad vs. Elevación', color: '#e2e8f0' }, legend: {display: false} }, scales: { x: { title: { display: true, text: 'Estática Δz (m)', color: '#94a3b8' }}, y: { position: 'left', title: { display: true, text: 'Caudal (m³/h)', color: '#3b82f6' } }, y1: { position: 'right', grid: {drawOnChartArea: false}, title: { display: true, text: 'Altura (m)', color: '#f59e0b' } } } } });
                return () => { chartOpRef.current?.destroy(); chartDRef.current?.destroy(); chartZRef.current?.destroy(); };
            }, []);

            useEffect(() => {
                if (!chartOpRef.current || !chartDRef.current || !chartZRef.current) return;

                // 1. Datos para Curva de Operación
                let q_labels = [], h_pump = [], h_sys = [];
                let maxQ = Math.sqrt(h0 / aCoef) * 1.1; 
                const Area = (Math.PI / 4) * Math.pow(d/1000, 2);
                
                for (let q = 0.01; q <= maxQ; q += maxQ/20) {
                    q_labels.push(q.toFixed(1));
                    h_pump.push(h0 - aCoef * Math.pow(q, 2));
                    
                    let V = (q/3600)/Area;
                    let Re = (V * d/1000) / nu;
                    let f = (Re < 2300) ? 64 / Math.max(Re, 1) : 0.25 / Math.pow(Math.log10(((roughnessE/1000) / (3.7 * d/1000)) + (5.74 / Math.pow(Re, 0.9))), 2);
                    let h_f = f * (l / (d/1000)) * (Math.pow(V, 2) / (2 * 9.81));
                    let h_loc = sumK * (Math.pow(V, 2) / (2 * 9.81));
                    h_sys.push(res.H_stat + h_f + h_loc);
                }

                chartOpRef.current.data = {
                    labels: q_labels,
                    datasets: [
                        { label: 'Curva Bomba', data: h_pump, borderColor: '#3b82f6', tension: 0.4, pointRadius: 0 },
                        { label: 'Curva Sistema', data: h_sys, borderColor: '#ef4444', tension: 0.4, pointRadius: 0 },
                        { label: 'Punto Operación', data: [{x: res.Q_op.toFixed(1), y: res.H_op}], backgroundColor: '#10b981', borderColor: '#10b981', pointRadius: 6, type: 'scatter' }
                    ]
                };
                chartOpRef.current.update();

                // 2. Sensibilidad al Diámetro
                let d_labels = [], q_vs_d = [], h_vs_d = [];
                for(let d_var = 25; d_var <= 150; d_var += 5) {
                    d_labels.push(d_var);
                    let sim = calculateOperatingPoint(h0, aCoef, z, dp, l, d_var, sumK, roughnessE, rho, nu);
                    q_vs_d.push(sim.Q_op); h_vs_d.push(sim.H_op);
                }
                chartDRef.current.data = {
                    labels: d_labels,
                    datasets: [
                        { label: 'Caudal Q', data: q_vs_d, borderColor: '#3b82f6', yAxisID: 'y', pointRadius: 0 },
                        { label: 'Altura H', data: h_vs_d, borderColor: '#f59e0b', yAxisID: 'y1', pointRadius: 0 }
                    ]
                };
                chartDRef.current.update();

                // 3. Sensibilidad a Elevación
                let z_labels = [], q_vs_z = [], h_vs_z = [];
                for(let z_var = 0; z_var <= h0; z_var += h0/20) {
                    z_labels.push(z_var.toFixed(1));
                    let sim = calculateOperatingPoint(h0, aCoef, z_var, dp, l, d, sumK, roughnessE, rho, nu);
                    q_vs_z.push(sim.Q_op); h_vs_z.push(sim.H_op);
                }
                chartZRef.current.data = {
                    labels: z_labels,
                    datasets: [
                        { label: 'Caudal Q', data: q_vs_z, borderColor: '#3b82f6', yAxisID: 'y', pointRadius: 0 },
                        { label: 'Altura H', data: h_vs_z, borderColor: '#f59e0b', yAxisID: 'y1', pointRadius: 0 }
                    ]
                };
                chartZRef.current.update();

                // Actualizar gráfica expandida si el modal está abierto
                if (expandedChart && expandedChartRef.current) {
                    let sourceChart;
                    if (expandedChart === 'op') sourceChart = chartOpRef.current;
                    if (expandedChart === 'd') sourceChart = chartDRef.current;
                    if (expandedChart === 'z') sourceChart = chartZRef.current;
                    
                    expandedChartRef.current.data = JSON.parse(JSON.stringify(sourceChart.data));
                    expandedChartRef.current.update();
                }

            }, [h0, aCoef, z, dp, l, d, sumK, roughnessE, rho, nu, res, expandedChart]);

            // --- MANEJO DE GRÁFICAS EXPANDIDAS ---
            const handleExpand = (type) => {
                setExpandedChart(type);
                setTimeout(() => {
                    if (expandedChartRef.current) expandedChartRef.current.destroy();
                    let sourceChart;
                    let title = '';
                    if (type === 'op') { sourceChart = chartOpRef.current; title = 'Curvas Reales de Operación'; }
                    if (type === 'd') { sourceChart = chartDRef.current; title = 'Sensibilidad vs. Diámetro'; }
                    if (type === 'z') { sourceChart = chartZRef.current; title = 'Sensibilidad vs. Elevación'; }

                    expandedChartRef.current = new Chart(document.getElementById('expanded_canvas'), {
                        type: 'line',
                        data: JSON.parse(JSON.stringify(sourceChart.data)),
                        options: {
                            ...sourceChart.options,
                            maintainAspectRatio: false,
                            plugins: {
                                ...sourceChart.options.plugins,
                                title: { display: true, text: title, color: '#e2e8f0', font: { size: 18 } }
                            }
                        }
                    });
                }, 50); // Pequeño retardo para asegurar que el canvas del modal ya exista
            };

            const closeExpanded = () => setExpandedChart(null);

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    {/* Header y Mini-Portada */}
                    <div className="mb-8 border-b border-slate-800 pb-6 flex flex-col md:flex-row justify-between md:items-end gap-6">
                        <div>
                            <p className="text-xs text-blue-400 uppercase tracking-widest font-bold mb-2">Mecánica de Fluidos • Dimensionamiento y selección de bombas</p>
                            <h1 className="text-3xl md:text-4xl font-black text-white mb-2 flex items-center gap-3">
                                <div className="p-2 bg-blue-500/20 rounded-lg text-blue-400"><PumpIcon /></div>
                                Dinámica de Sistemas de Bombeo
                            </h1>
                            <p className="text-slate-400 mt-2 text-sm max-w-2xl">Simulación interactiva para el análisis del Punto de Operación Real (P.O.R.), factor de fricción variable (Swamee-Jain) y estrategias de control.</p>
                        </div>
                        <div className="text-left md:text-right bg-slate-900/50 p-4 rounded-xl border border-slate-800 shrink-0">
                            <p className="text-sm font-bold text-slate-200">Universidad de América</p>
                            <p className="text-xs text-slate-400 mt-1">Docente: Ph.D. Juan Sandoval Herrera</p>
                            <p className="text-xs text-slate-500 mt-1">2026</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        {/* PANEL IZQUIERDO: Controles Generales */}
                        <div className="lg:col-span-4 space-y-6">
                            
                            {/* Fluido */}
                            <div className="bg-slate-900 border border-slate-800 p-5 rounded-xl shadow-lg relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-2 opacity-5 pointer-events-none"><DropletsIcon /></div>
                                <h2 className="text-sm font-bold text-slate-300 uppercase tracking-wider mb-4 border-b border-slate-800 pb-2">1. Propiedades del Fluido</h2>
                                <div className="space-y-3">
                                    <select className="w-full bg-slate-950 border border-slate-700 rounded p-1.5 text-xs text-white outline-none" value={fluidPreset} onChange={e=>setFluidPreset(e.target.value)}>
                                        <option value="agua20">Agua a 20°C</option>
                                        <option value="agua80">Agua a 80°C</option>
                                        <option value="aceiteLigero">Aceite Ligero</option>
                                        <option value="personalizado">-- Ingreso Manual --</option>
                                    </select>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="text-[10px] text-slate-400">Densidad ρ (kg/m³)</label><input type="number" step="1" className="w-full bg-slate-950 border border-slate-700 rounded p-1.5 text-sm text-white outline-none" value={rho} onChange={e=>{setRho(parseFloat(e.target.value)); setFluidPreset('personalizado');}} /></div>
                                        <div><label className="text-[10px] text-slate-400">Visc. Cinemática ν (m²/s)</label><input type="number" step="1e-7" className="w-full bg-slate-950 border border-slate-700 rounded p-1.5 text-sm text-white outline-none" value={nu} onChange={e=>{setNu(parseFloat(e.target.value)); setFluidPreset('personalizado');}} /></div>
                                    </div>
                                </div>
                            </div>

                            {/* Bomba */}
                            <div className="bg-slate-900 border border-slate-800 p-5 rounded-xl shadow-lg">
                                <h2 className="text-sm font-bold text-slate-300 uppercase tracking-wider mb-4 border-b border-slate-800 pb-2">2. Curva de la Bomba</h2>
                                <div className="space-y-4">
                                    <div><div className="flex justify-between text-xs mb-1"><span className="text-slate-400">Altura a Válv. Cerrada (H₀)</span><span className="text-blue-400 font-bold">{h0} m</span></div><input type="range" min="10" max="150" step="1" className="w-full" value={h0} onChange={e=>setH0(parseFloat(e.target.value))} /></div>
                                    <div><div className="flex justify-between text-xs mb-1"><span className="text-slate-400">Coeficiente Caída (a)</span><span className="text-blue-400 font-bold">{aCoef}</span></div><input type="range" min="0.001" max="0.1" step="0.001" className="w-full" value={aCoef} onChange={e=>setA(parseFloat(e.target.value))} /></div>
                                </div>
                            </div>

                            {/* Tubería */}
                            <div className="bg-slate-900 border border-slate-800 p-5 rounded-xl shadow-lg">
                                <h2 className="text-sm font-bold text-slate-300 uppercase tracking-wider mb-4 border-b border-slate-800 pb-2">3. Tubería y Cargas</h2>
                                <div className="grid grid-cols-2 gap-3 mb-3">
                                    <div><label className="text-[10px] text-slate-400">Elevación Δz (m)</label><input type="number" step="0.5" className="w-full bg-slate-950 border border-slate-700 rounded p-1.5 text-sm text-white outline-none" value={z} onChange={e=>setZ(parseFloat(e.target.value))} /></div>
                                    <div><label className="text-[10px] text-slate-400">ΔP Tanques (bar)</label><input type="number" step="0.1" className="w-full bg-slate-950 border border-slate-700 rounded p-1.5 text-sm text-white outline-none" value={dp} onChange={e=>setDp(parseFloat(e.target.value))} /></div>
                                    <div><label className="text-[10px] text-slate-400">Longitud L (m)</label><input type="number" step="1" className="w-full bg-slate-950 border border-slate-700 rounded p-1.5 text-sm text-white outline-none" value={l} onChange={e=>setL(parseFloat(e.target.value))} /></div>
                                    <div><label className="text-[10px] text-slate-400">Diámetro Int. D (mm)</label><input type="number" step="1" className="w-full bg-slate-950 border border-slate-700 rounded p-1.5 text-sm text-white outline-none" value={d} onChange={e=>setD(parseFloat(e.target.value))} /></div>
                                </div>
                                <div className="border-t border-slate-800 pt-3">
                                    <label className="text-[10px] text-slate-400 block mb-1">Rugosidad Absoluta, e (mm)</label>
                                    <div className="flex gap-2">
                                        <select className="flex-1 bg-slate-950 border border-slate-700 rounded p-1.5 text-xs text-white outline-none" value={matPreset} onChange={e=>setMatPreset(e.target.value)}>
                                            <option value="pvc">PVC</option>
                                            <option value="aceroComercial">Acero Comercial</option>
                                            <option value="fundicion">Fundición</option>
                                            <option value="personalizado">Personalizado</option>
                                        </select>
                                        <input type="number" step="0.0001" className="w-20 bg-slate-950 border border-slate-700 rounded p-1.5 text-sm text-white outline-none" value={roughnessE} onChange={e=>{setRoughnessE(parseFloat(e.target.value)); setMatPreset('personalizado');}} />
                                    </div>
                                </div>
                            </div>

                        </div>

                        {/* PANEL CENTRAL: Resultados, Accesorios y Gráfica */}
                        <div className="lg:col-span-8 flex flex-col gap-6">
                            
                            {/* Resultados Header Dinámicos */}
                            <div className="bg-gradient-to-r from-slate-900 to-slate-800 border border-slate-700 rounded-xl p-6 shadow-xl flex flex-wrap gap-4 md:gap-8 items-center relative overflow-hidden">
                                <div className="absolute right-0 top-0 h-full w-2 bg-gradient-to-b from-blue-500 to-emerald-500"></div>
                                <div>
                                    <p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold mb-1">Caudal Resultante (Q)</p>
                                    <p className="text-4xl font-black text-blue-400">{res.Q_op > 0 ? res.Q_op.toFixed(1) : '0.0'} <span className="text-sm text-blue-500/50">m³/h</span></p>
                                </div>
                                <div>
                                    <p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold mb-1">Altura Manométrica (H)</p>
                                    <p className="text-4xl font-black text-emerald-400">{res.Q_op > 0 ? res.H_op.toFixed(1) : res.H_stat.toFixed(1)} <span className="text-sm text-emerald-500/50">m</span></p>
                                </div>
                                <div className="border-l border-slate-700 pl-4 md:pl-8">
                                    <p className="text-[10px] text-slate-400 mb-1">Datos Fluidodinámicos</p>
                                    <div className="text-xs text-slate-300">
                                        <p>Reynolds: <strong className="text-white">{Math.round(res.Re).toLocaleString()}</strong></p>
                                        <p>Factor <em className="italic">f</em>: <strong className="text-white">{res.f.toFixed(4)}</strong></p>
                                        <p>Pot. Hidr: <strong className="text-white">{res.P_hid.toFixed(2)} kW</strong></p>
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* Módulo de Accesorios (ΣK) */}
                                <div className="md:col-span-1 bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-lg flex flex-col">
                                    <div className="flex justify-between items-center border-b border-slate-800 pb-2 mb-3">
                                        <h2 className="text-sm font-bold text-slate-300 uppercase">4. Pérdidas Menores</h2>
                                        <span className="bg-red-500/20 text-red-400 font-bold px-2 py-0.5 rounded text-xs">ΣK = {sumK.toFixed(2)}</span>
                                    </div>
                                    
                                    <div className="flex-1 overflow-y-auto mb-3 max-h-32 pr-1 space-y-2">
                                        {accesorios.length === 0 ? <p className="text-xs text-slate-500 italic">No hay accesorios en la línea.</p> :
                                            accesorios.map(acc => (
                                                <div key={acc.id} className="flex justify-between items-center bg-slate-950 p-2 rounded border border-slate-800">
                                                    <div className="truncate pr-2">
                                                        <span className="text-white text-xs font-semibold mr-2">{acc.qty}x</span>
                                                        <span className="text-slate-400 text-[10px]">{DB_ACCESORIOS[acc.type].name}</span>
                                                    </div>
                                                    <button onClick={() => removeAccessory(acc.id)} className="text-slate-600 hover:text-red-400 transition-colors"><TrashIcon /></button>
                                                </div>
                                            ))
                                        }
                                    </div>

                                    <div className="mt-auto border-t border-slate-800 pt-3">
                                        <div className="flex flex-col gap-2">
                                            <select className="w-full bg-slate-950 border border-slate-700 rounded p-1.5 text-[10px] text-slate-200 outline-none" value={newAccType} onChange={e=>setNewAccType(e.target.value)}>
                                                {Object.entries(DB_ACCESORIOS).map(([key, val]) => <option key={key} value={key}>{val.name} (K={val.k.toFixed(2)})</option>)}
                                            </select>
                                            <div className="flex gap-2">
                                                <input type="number" min="1" className="w-16 bg-slate-950 border border-slate-700 rounded p-1.5 text-xs text-white text-center outline-none" value={newAccQty} onChange={e=>setNewAccQty(e.target.value)} />
                                                <button onClick={addAccessory} className="flex-1 bg-slate-800 hover:bg-slate-700 text-white rounded text-xs font-semibold flex items-center justify-center gap-1 transition-colors"><PlusIcon/> Agregar</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Gráfica Principal con Botón de Expansión */}
                                <div className="md:col-span-2 bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-lg min-h-[300px] relative group">
                                    <button onClick={() => handleExpand('op')} className="absolute top-3 right-3 p-1.5 bg-slate-800 text-slate-400 hover:text-white rounded opacity-0 group-hover:opacity-100 transition-opacity z-10" title="Expandir gráfica">
                                        <ExpandIcon />
                                    </button>
                                    <canvas id="chart_op"></canvas>
                                </div>
                            </div>

                            {/* Análisis Final */}
                            <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-5 text-sm text-slate-300">
                                <h3 className="text-white font-bold mb-2 flex items-center gap-2"><BookIcon /> Diagnóstico del Modelo</h3>
                                {res.Q_op > 0 ? (
                                    <p className="leading-relaxed">
                                        El balance iterativo determinó un caudal de <strong className="text-blue-400">{res.Q_op.toFixed(1)} m³/h</strong>. 
                                        Con las propiedades actuales (ρ = {rho} kg/m³, ν = {nu.toExponential(2)} m²/s) y geometría, el flujo se encuentra en régimen <strong className="text-emerald-400">{res.Re < 2300 ? 'Laminar' : 'Turbulento'}</strong>. 
                                        El requerimiento estático total (elevación Δz + carga de presión corregida por densidad) representa {res.H_stat.toFixed(1)} m de la energía manométrica total.
                                        Al agregar accesorios desde el panel, podrás visualizar cómo un <em>estrangulamiento</em> eleva la curva del sistema, forzando a la bomba a operar a menor caudal pero con mayor demanda energética específica.
                                    </p>
                                ) : (
                                    <p className="text-red-400 font-semibold leading-relaxed">
                                        Falla de Bombeo: La altura estática de diseño ({res.H_stat.toFixed(1)} m) excede el punto de shut-off (corte) de la bomba ({h0} m). Revise la elevación Δz, la caída de presión en tanques, o utilice un arreglo de bombas en serie.
                                    </p>
                                )}
                            </div>
                        </div>

                    </div>

                    {/* SECCIÓN INFERIOR: Gráficas de Sensibilidad */}
                    <div className="mt-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-lg h-[280px] relative group">
                            <button onClick={() => handleExpand('d')} className="absolute top-3 right-3 p-1.5 bg-slate-800 text-slate-400 hover:text-white rounded opacity-0 group-hover:opacity-100 transition-opacity z-10" title="Expandir gráfica">
                                <ExpandIcon />
                            </button>
                            <canvas id="chart_d"></canvas>
                        </div>
                        <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-lg h-[280px] relative group">
                            <button onClick={() => handleExpand('z')} className="absolute top-3 right-3 p-1.5 bg-slate-800 text-slate-400 hover:text-white rounded opacity-0 group-hover:opacity-100 transition-opacity z-10" title="Expandir gráfica">
                                <ExpandIcon />
                            </button>
                            <canvas id="chart_z"></canvas>
                        </div>
                    </div>

                    {/* Explicación Teórica Mejorada */}
                    <div className="mt-8 bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-lg">
                        <h3 className="text-white font-bold mb-4 text-lg border-b border-slate-800 pb-2">Fundamentos Matemáticos del Modelo</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm text-slate-400 leading-relaxed">
                            <div>
                                <p className="mb-2"><strong className="text-slate-200">1. Curva de la Bomba:</strong> Caracteriza la conversión de energía mecánica a presión mediante un ajuste polinomial:</p>
                                <div className="flex justify-center bg-slate-950 p-3 rounded border border-slate-800 my-4 text-blue-400 font-mono text-lg">
                                    H<sub>p</sub> = H<sub>0</sub> - a·Q<sup>2</sup>
                                </div>
                                <p>Donde <em className="text-slate-300">H<sub>0</sub></em> es la altura de corte (shut-off) y <em className="text-slate-300">a</em> representa la caída de cabeza impuesta por el diseño geométrico del rodete.</p>
                            </div>
                            <div>
                                <p className="mb-2"><strong className="text-slate-200">2. Curva del Sistema:</strong> Derivada directamente de la Ecuación de Bernoulli extendida:</p>
                                <div className="flex justify-center bg-slate-950 p-3 rounded border border-slate-800 my-4 text-red-400 font-mono text-lg text-center overflow-x-auto whitespace-nowrap">
                                    H<sub>s</sub> = (Δz + ΔP/ρg) + [ f·(L/D) + ΣK ] · [ 8 / (π²gD⁴) ] · Q<sup>2</sup>
                                </div>
                                <p>El modelo utiliza la aproximación de Swamee-Jain para recalcular el factor de fricción <em className="text-slate-300">f</em> en cada iteración basándose en el Reynolds y la rugosidad <em className="text-slate-300">e</em>.</p>
                            </div>
                        </div>
                    </div>

                    {/* Modal para Gráficas Expandidas */}
                    {expandedChart && (
                        <div className="fixed inset-0 bg-slate-950/90 z-50 flex items-center justify-center p-4 md:p-10 backdrop-blur-sm">
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-5xl h-[85vh] flex flex-col overflow-hidden shadow-2xl relative">
                                <div className="flex justify-between items-center p-4 border-b border-slate-800 bg-slate-900">
                                    <h3 className="text-xl font-bold text-white">Análisis Detallado</h3>
                                    <button onClick={closeExpanded} className="text-slate-400 hover:text-red-400 transition-colors p-1" title="Cerrar">
                                        <CloseIcon />
                                    </button>
                                </div>
                                <div className="p-6 flex-grow relative w-full h-full bg-slate-950">
                                    <canvas id="expanded_canvas"></canvas>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PumpSimulation />);
    </script>
</body>
</html>
